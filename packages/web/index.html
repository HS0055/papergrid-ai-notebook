    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta name="apple-mobile-web-app-title" content="Papera" />

    <!-- Brand icons — point every platform at the same Papera icon
         asset so the favicon on web, the iOS home-screen icon, and
         the Android PWA tile all use the real logo. The
         papera-icon-app.png is the 2000×2000 master; browsers
         downscale it per their own size needs. -->
    <link rel="icon" type="image/png" href="/brand/papera-icon-app.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/papera-icon-app.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/brand/papera-icon-app.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/brand/papera-icon-app.png" />
    <link rel="shortcut icon" href="/brand/papera-icon-app.png" />
    <link rel="apple-touch-icon" href="/brand/papera-icon-app.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/papera-icon-app.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#4f46e5" />
    <meta name="msapplication-TileColor" content="#4f46e5" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Papera",
      "description": "AI-powered digital notebook and planner app that generates beautiful layouts instantly. Features 10 real paper textures, 22+ block types including priority matrix, mood tracker, Kanban, Cornell notes, and music staff.",
      "url": "https://papera.app",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "iOS, Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free to start with AI-powered layouts. No subscription required."
      },
      "featureList": [
        "AI layout generation from natural language",
        "22+ content block types",
        "10 real paper textures",
        "Kanban boards",
        "Music staff notation",
        "Habit and mood trackers",
        "Calendar and weekly planners",
        "Cornell Notes mode",
        "Bullet Journal mode",
        "Priority Matrix (Eisenhower method)",
        "Export to PDF"
      ]
    }
    </script>

    <!-- Structured Data: HowTo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to Create an AI-Generated Notebook Layout with Papera",
      "description": "Create a custom digital notebook layout in seconds using Papera's AI-powered layout generator.",
      "totalTime": "PT30S",
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Describe your need",
          "text": "Type anything — 'daily planner for a freelancer' or 'gratitude journal with habit tracker.'"
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "AI designs the layout",
          "text": "AI generates a full notebook spread with headings, grids, matrices, callouts, and more."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Write and customize",
          "text": "Every block is editable. Move them, recolor, restyle. Choose from 10 paper textures and 4 journal modes."
        }
      ]
    }
    </script>

    <!-- Font preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
